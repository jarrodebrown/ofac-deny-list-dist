name: Publish OFAC deny list

# Regenerates the OFAC deny list from public sources (Treasury OFAC CSVs +
# ipdeny country blocks) and publishes it as an ipset add-list on a rolling
# GitHub Release. The EdgeRouter pulls this asset daily (see
# router/ofac-pull.sh), verifies the checksum, and reloads it into the
# OFAC_DENY ipset — no laptop involved.
#
# The deny list is derived entirely from public data, so the Release is public
# and the router needs no credentials to fetch it.

on:
  schedule:
    - cron: "0 8 * * *"      # daily at 08:00 UTC
  workflow_dispatch: {}       # allow manual runs

permissions:
  contents: write             # needed to create/update the Release

concurrency:
  group: ofac-publish
  cancel-in-progress: false

env:
  IPSET_NAME: OFAC_DENY
  RELEASE_TAG: deny-list
  MIN_ENTRIES: "5000"         # safety floor: refuse to publish a suspiciously small list

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate OFAC deny list (public sources)
        run: |
          python3 ofac_deny_list.py --output-dir deny_lists
          test -f deny_lists/combined_deny.txt

      - name: Build ipset add-list + checksum, with sanity gate
        run: |
          set -euo pipefail
          awk '/^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+\/[0-9]+$/ {print "add '"$IPSET_NAME"' " $0}' \
            deny_lists/combined_deny.txt > ofac_deny.ipset
          COUNT=$(wc -l < ofac_deny.ipset | tr -d ' ')
          echo "Generated $COUNT prefixes"
          if [ "$COUNT" -lt "$MIN_ENTRIES" ]; then
            echo "::error::Only $COUNT prefixes (< $MIN_ENTRIES floor) — refusing to publish a possibly-truncated list"
            exit 1
          fi
          sha256sum ofac_deny.ipset | awk '{print $1}' > ofac_deny.ipset.sha256
          echo "COUNT=$COUNT" >> "$GITHUB_ENV"

      - name: Publish rolling Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          NOTES="Auto-generated $(date -u '+%Y-%m-%d %H:%M UTC') — ${COUNT} prefixes. Consumed by the EdgeRouter daily pull (checksum-verified)."
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" ofac_deny.ipset ofac_deny.ipset.sha256 --clobber
            gh release edit "$RELEASE_TAG" --notes "$NOTES"
          else
            gh release create "$RELEASE_TAG" ofac_deny.ipset ofac_deny.ipset.sha256 \
              --title "OFAC deny list (rolling)" --notes "$NOTES"
          fi
          echo "Published: https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/ofac_deny.ipset"
