name: Publish OFAC deny list

# Regenerates the deny list from public sources — Treasury OFAC CSVs + ipdeny
# country blocks, PLUS extra public threat feeds (FireHOL, Spamhaus DROP/EDROP,
# abuse.ch Feodo, Tor exit nodes) — and publishes it as an ipset add-list on a
# rolling GitHub Release. The EdgeRouter pulls this daily, verifies the checksum,
# and reloads it into the OFAC_DENY set. All public data, so no credentials.

on:
  schedule:
    - cron: "0 8 * * *"      # daily at 08:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: ofac-publish
  cancel-in-progress: false

env:
  IPSET_NAME: OFAC_DENY
  RELEASE_TAG: deny-list
  MIN_ENTRIES: "5000"

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate OFAC deny list (public sources)
        run: |
          python3 ofac_deny_list.py --output-dir deny_lists
          test -f deny_lists/combined_deny.txt

      - name: Add extra public threat feeds
        run: bash extra_feeds.sh deny_lists/combined_deny.txt

      - name: Build ipset add-list + checksum, with sanity gate
        run: |
          set -euo pipefail
          # Extract all CIDR lines (OFAC + feeds), dedupe, then build add-lines.
          grep -oE '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+/[0-9]+' deny_lists/combined_deny.txt \
            | sort -u | awk -v s="$IPSET_NAME" '{print "add " s " " $0}' > ofac_deny.ipset
          COUNT=$(wc -l < ofac_deny.ipset | tr -d ' ')
          echo "Generated $COUNT unique prefixes (OFAC + feeds)"
          if [ "$COUNT" -lt "$MIN_ENTRIES" ]; then
            echo "::error::Only $COUNT prefixes (< $MIN_ENTRIES floor) — refusing to publish a possibly-truncated list"
            exit 1
          fi
          sha256sum ofac_deny.ipset | awk '{print $1}' > ofac_deny.ipset.sha256
          echo "COUNT=$COUNT" >> "$GITHUB_ENV"

      - name: Sign the ipset (ECDSA P-256 / SHA-256)
        env:
          DENYLIST_SIGNING_KEY: ${{ secrets.DENYLIST_SIGNING_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${DENYLIST_SIGNING_KEY:-}" ]; then
            echo "::warning::no DENYLIST_SIGNING_KEY secret — publishing unsigned"; exit 0
          fi
          # ECDSA P-256 + SHA-256 via `dgst` — verifiable by the router's openssl 1.1.1
          # (Ed25519 pkeyutl -rawin is 3.0-only, so it can't be used on the EdgeRouter).
          printf '%s\n' "$DENYLIST_SIGNING_KEY" > signing.key
          openssl dgst -sha256 -sign signing.key -out ofac_deny.ipset.sig ofac_deny.ipset
          rm -f signing.key
          echo "signed ($(wc -c < ofac_deny.ipset.sig) byte ECDSA signature)"

      - name: Publish rolling Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          NOTES="Auto-generated $(date -u '+%Y-%m-%d %H:%M UTC') — ${COUNT} prefixes (OFAC + public threat feeds). Consumed by the EdgeRouter daily pull (checksum-verified)."
          ASSETS="ofac_deny.ipset ofac_deny.ipset.sha256"
          [ -f ofac_deny.ipset.sig ] && ASSETS="$ASSETS ofac_deny.ipset.sig"
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" $ASSETS --clobber
            gh release edit "$RELEASE_TAG" --notes "$NOTES"
          else
            gh release create "$RELEASE_TAG" $ASSETS \
              --title "OFAC deny list (rolling)" --notes "$NOTES"
          fi
          echo "Published: https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/ofac_deny.ipset"
